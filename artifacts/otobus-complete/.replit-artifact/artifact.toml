kind = "web"
previewPath = "/"
title = "أتوبيس كومبليت"
version = "1.0.0"
id = "artifacts/otobus-complete"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24175

[services.development]
run = "pnpm --filter @workspace/otobus-complete run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/otobus-complete", "run", "build" ]
publicDir = "artifacts/otobus-complete/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24175"
BASE_PATH = "/"
